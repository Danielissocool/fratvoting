<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BOTM VOTING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Share+Tech+Mono&display=swap');
        
        body { margin: 0; background: #01040a; color: #e2e2e2; overflow: hidden; font-family: 'Share Tech Mono', monospace; }
        
        #globe-viewport {
            position: fixed; 
            bottom: 40px; 
            left: 40px; 
            width: 500px; 
            height: 500px; 
            z-index: 1; 
            pointer-events: none;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.5) 100%),
                        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 100%, 100% 4px; pointer-events: none; z-index: 50;
        }

        .ui-layer { position: relative; z-index: 10; height: 100vh; display: grid; grid-template-columns: 1fr 1.2fr; padding: 5rem; gap: 8rem; }
        .interactive { pointer-events: auto; }
        
        .bo2-panel { 
            background: rgba(2, 8, 18, 0.85); border: 1px solid rgba(0, 136, 255, 0.2); 
            border-left: 4px solid #0088ff; box-shadow: 0 0 40px rgba(0, 136, 255, 0.05); backdrop-filter: blur(8px); 
        }
        .leader-panel { border-left: 4px solid #ffd700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }
        
        .bo2-header { font-family: 'Orbitron', sans-serif; transform: skewX(-10deg); color: #fff; text-shadow: 0 0 15px rgba(0, 136, 255, 0.5); }
        
        /* FIX 2: Dedicated Input Class to prevent CSS Flexbox conflicts */
        .bo2-input { 
            background: rgba(0, 136, 255, 0.05); 
            border: 1px solid rgba(0, 136, 255, 0.1); 
            color: white; 
            padding: 12px; 
            transition: all 0.3s ease;
        }
        .bo2-input:focus { outline: none; border-color: #0088ff; box-shadow: 0 0 10px rgba(0, 136, 255, 0.3); }
        .bo2-input:disabled { opacity: 0.5; cursor: not-allowed; border-color: red; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #0088ff; }
    </style>
</head>
<body onclick="playMusic()">

    <div id="music-container" style="display:none;">
        <iframe id="youtube-player" width="1" height="1" src="https://www.youtube.com/embed/sIWnz0x_pSQ?enablejsapi=1&autoplay=1" allow="autoplay" frameborder="0"></iframe>
    </div>

    <div id="globe-viewport">
        <div id="canvas-container" class="w-full h-full"></div>
    </div>

    <main class="ui-layer">
        <section class="flex flex-col justify-center">
            <h1 class="bo2-header text-6xl font-black italic uppercase mb-2">PHI DELTA THETA</h1>
            <p class="text-blue-400 font-bold tracking-[0.4em] mb-12 text-sm opacity-80 flex items-center gap-4">
                BROTHER OF THE MONTH // <span id="lock-timer" class="text-white font-mono bg-blue-900/50 px-3 py-1 border border-blue-500/30">CALCULATING...</span>
            </p>
            
            <div class="bo2-panel p-10 space-y-5 interactive" id="nomination-form">
                <h2 class="text-blue-500 text-xs font-bold uppercase tracking-[0.3em]" id="form-status">NEW_NOMINATION_ENTRY</h2>
                
                <div class="flex gap-4 w-full">
                    <input type="text" id="nameInput" placeholder="BROTHER'S NAME" class="bo2-input flex-1">
                    <input type="text" id="bondInput" placeholder="BOND #" class="bo2-input w-32 text-center flex-shrink-0">
                </div>
                
                <div>
                    <textarea id="reasonInput" rows="3" placeholder="REASON FOR FORGING" class="bo2-input w-full"></textarea>
                </div>
                <div class="relative w-full">
                    <input type="file" id="imgInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="updateFileName()">
                    <div id="file-name-display" class="bg-[rgba(0,136,255,0.05)] border border-[rgba(0,136,255,0.1)] text-white/50 p-3 text-sm tracking-widest uppercase transition-colors text-center">
                        [ CLICK TO SELECT IMAGE ]
                    </div>
                </div>
                <button id="submitBtn" onclick="submitNominee()" class="w-full bg-blue-600 hover:bg-blue-400 text-white font-black py-4 uppercase transition-all shadow-lg shadow-blue-500/20 disabled:bg-red-900 disabled:text-red-500 disabled:cursor-not-allowed">
                    Submit Nomination
                </button>
            </div>
        </section>

        <section class="flex flex-col justify-center">
            <div class="flex justify-between items-end mb-4 pr-6">
                <h2 class="text-xs font-bold opacity-50 tracking-[0.8em] text-blue-300">ACTUAL_DATA_FEED</h2>
            </div>
            <div id="nomineeList" class="space-y-4 overflow-y-auto pr-6 max-h-[70vh] interactive pb-10">
                <div class="text-center opacity-50 italic animate-pulse py-10">ESTABLISHING UPLINK TO DATABASE...</div>
            </div>
        </section>
    </main>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        camera.position.z = 2.8; // Tightly frames the 500x500 box
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        const loader = new THREE.TextureLoader();
        const nightMap = loader.load('https://unpkg.com/three-globe@2.31.0/example/img/earth-night.jpg');
        const rimLight = new THREE.DirectionalLight(0x0088ff, 6);
        rimLight.position.set(-2, 1, 1);
        scene.add(rimLight);
        const blueFill = new THREE.PointLight(0x0044ff, 15);
        blueFill.position.set(2, -1, 1);
        scene.add(blueFill);
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshStandardMaterial({
            color: 0x000510, emissive: 0x0088ff, emissiveMap: nightMap, emissiveIntensity: 2.5, roughness: 0.9
        });
        const earth = new THREE.Mesh(geometry, material);
        earth.rotation.y = 4.8; 
        scene.add(earth);
        const pCount = 1000;
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(pCount * 3);
        for(let i=0; i<pCount*3; i++) pPos[i] = (Math.random() - 0.5) * 4;
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        const pMat = new THREE.PointsMaterial({ color: 0x0088ff, size: 0.005, transparent: true, opacity: 0.2 });
        const particles = new THREE.Points(pGeo, pMat);
        scene.add(particles);
        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.0004; particles.rotation.y -= 0.0002;
            material.emissiveIntensity = 1.5 + (Math.sin(Date.now() * 0.001) * 1.0);
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            renderer.setSize(container.clientWidth, container.clientHeight);
            camera.aspect = 1; camera.updateProjectionMatrix();
        });
    </script>

    <script>
        // --- 1. SUPABASE UPLINK ---
        const SUPABASE_URL = "https://uaxvtfcptipyaobrubcw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_SYmZfAPD5nNpSINs6vFfIg_8jok_CBS";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. TIMER & LOCK LOGIC ---
        let votingPhase = "ACTIVE";
        const now = new Date();
        const targetDate = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59).getTime();

        setInterval(() => {
            const currentTime = new Date().getTime();
            const distance = targetDate - currentTime;
            const timerEl = document.getElementById("lock-timer");

            if (distance < 0) {
                votingPhase = "LOCKED";
                timerEl.innerHTML = "VOTING LOCKED";
                timerEl.classList.replace("text-white", "text-red-500");
                timerEl.classList.replace("border-blue-500/30", "border-red-500");
                
                document.getElementById("nameInput").disabled = true;
                document.getElementById("bondInput").disabled = true;
                document.getElementById("reasonInput").disabled = true;
                document.getElementById("imgInput").disabled = true;
                document.getElementById("submitBtn").disabled = true;
                document.getElementById("submitBtn").innerHTML = "SYSTEM SECURED";
            } else {
                const d = Math.floor(distance / (1000 * 60 * 60 * 24));
                const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((distance % (1000 * 60)) / 1000);
                timerEl.innerHTML = `T-MINUS ${d}D ${h}H ${m}M ${s}S`;
            }
        }, 1000);

        // --- 3. UI HELPERS ---
        function playMusic() {
            const player = document.getElementById('youtube-player');
            player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        }

        function updateFileName() {
            const fileInput = document.getElementById('imgInput');
            const display = document.getElementById('file-name-display');
            if(fileInput.files.length > 0) {
                display.innerHTML = `[ IMAGE ACQUIRED: ${fileInput.files[0].name} ]`;
                display.classList.replace("text-white/50", "text-white");
                display.classList.replace("border-[rgba(0,136,255,0.1)]", "border-blue-400");
            }
        }

        // --- 4. LEGACY SUBMISSION PORTED TO BO2 UI ---
        async function submitNominee() {
            if (votingPhase !== "ACTIVE") return alert("Voting window closed.");
            if (localStorage.getItem('hasNominated') === 'true') return alert("ONE NOMINATION PER MONTH PERMITTED.");
            
            const name = document.getElementById("nameInput").value;
            const bond = document.getElementById("bondInput").value;
            const reason = document.getElementById("reasonInput").value;
            const file = document.getElementById("imgInput").files[0];
            const btn = document.getElementById("submitBtn");

            if(!name || !bond || !reason) return alert("ALL FIELDS ARE REQUIRED.");

            btn.innerText = "UPLOADING TO NOMINATIONS...";
            btn.disabled = true;

            const { data: existing } = await supabaseClient.from("nominees").select("*").eq("bond_number", bond).single();
            
            if (existing) {
                const updatedReason = existing.event_reason + " <br><br>• " + reason;
                const newCount = (existing.nomination_count || 1) + 1;
                await supabaseClient.from("nominees").update({ event_reason: updatedReason, nomination_count: newCount }).eq("id", existing.id);
                alert(`BOND #${bond} ALREADY IN SYSTEM. REASON APPENDED.`);
            } else {
                if(!file) {
                    alert("IMAGE REQUIRED FOR NEW NOMINEE.");
                    btn.innerText = "Submit Nomination";
                    btn.disabled = false;
                    return;
                }
                const { data: storageData } = await supabaseClient.storage.from("nominee-images").upload(Date.now() + file.name, file);
                const url = supabaseClient.storage.from("nominee-images").getPublicUrl(storageData.path).data.publicUrl;
                await supabaseClient.from("nominees").insert([{ name: name, bond_number: bond, event_reason: "• " + reason, image_url: url, nomination_count: 1, votes: 0 }]);
            }

            localStorage.setItem('hasNominated', 'true');
            
            document.getElementById("nameInput").value = '';
            document.getElementById("bondInput").value = '';
            document.getElementById("reasonInput").value = '';
            document.getElementById("imgInput").value = '';
            document.getElementById('file-name-display').innerHTML = '[ CLICK TO SELECT IMAGE ]';
            
            btn.innerText = "Submit Nomination";
            btn.disabled = false;
            
            loadNominees();
        }

        // --- 5. LEGACY VOTING LOGIC ---
        async function vote(id, currentVotes) {
            if (votingPhase !== "ACTIVE") return alert("VOTING SECURED. NO FURTHER ENTRIES.");
            if (localStorage.getItem('hasVotedTotal') === 'true') return alert("YOU HAVE ALREADY CAST YOUR VOTE.");
            
            const { error } = await supabaseClient.from("nominees").update({ votes: (currentVotes || 0) + 1 }).eq("id", id);
            if (!error) {
                localStorage.setItem('hasVotedTotal', 'true');
                localStorage.setItem('voted_' + id, 'true');  
                loadNominees();
            }
        }

        // --- 6. LEGACY DATA FEED PORTED TO BO2 CARDS ---
        async function loadNominees() {
            const { data } = await supabaseClient.from("nominees").select("*").order("votes", { ascending: false });
            const container = document.getElementById("nomineeList");
            
            if (!data || data.length === 0) return container.innerHTML = "<div class='text-center opacity-50 italic py-10'>NO NOMINATIONS DETECTED IN DATABASE.</div>";

            container.innerHTML = "";
            const maxVotes = Math.max(...data.map(n => n.votes || 0));
            const userHasVoted = localStorage.getItem('hasVotedTotal') === 'true';

            data.forEach(nominee => {
                const isLeader = nominee.votes === maxVotes && maxVotes > 0;
                const isTheirVote = localStorage.getItem('voted_' + nominee.id);
                
                const leaderClass = isLeader ? 'leader-panel' : 'border-l-blue-500';
                const badge = nominee.nomination_count > 1 ? `<span class="bg-blue-600 text-white text-[10px] px-2 py-1 font-bold ml-2">x${nominee.nomination_count}</span>` : '';
                
                let btnText = "CAST VOTE";
                let btnStyle = "bg-blue-600 hover:bg-blue-400 text-white";
                let disabledAttr = "";

                if (isTheirVote) {
                    btnText = "VOTE SECURED";
                    btnStyle = "bg-[#ffd700] text-black cursor-not-allowed";
                    disabledAttr = "disabled";
                } else if (userHasVoted || votingPhase !== "ACTIVE") {
                    btnText = "LOCKED";
                    btnStyle = "bg-white/10 text-white/30 cursor-not-allowed border border-white/10";
                    disabledAttr = "disabled";
                }

                container.innerHTML += `
                    <div class="bo2-panel p-4 flex gap-5 ${leaderClass} transition-all">
                        <div class="w-24 h-24 bg-blue-900/20 border ${isLeader ? 'border-[#ffd700]/50' : 'border-blue-500/30'} flex-shrink-0 relative">
                            ${isLeader ? '<div class="absolute -top-3 -left-2 text-2xl drop-shadow-[0_0_5px_gold] z-20">👑</div>' : ''}
                            <img src="${nominee.image_url}" class="w-full h-full object-cover grayscale contrast-150 brightness-75">
                        </div>
                        <div class="flex-1 flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-start">
                                    <h3 class="font-bold text-blue-400 uppercase tracking-tighter text-lg leading-none">${nominee.name} ${badge}</h3>
                                    <span class="text-[10px] bg-blue-900/50 text-blue-300 px-2 py-1 font-mono tracking-widest border border-blue-500/20">BOND #${nominee.bond_number}</span>
                                </div>
                                <p class="text-xs opacity-70 mt-2 leading-relaxed italic text-blue-100 pr-2 overflow-hidden" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">"${nominee.event_reason || 'NO REASON LOGGED'}"</p>
                            </div>
                            <div class="mt-3 flex justify-between items-end border-t border-white/5 pt-3">
                                <div class="font-mono text-sm tracking-widest ${isLeader ? 'text-[#ffd700]' : 'text-blue-500'}">
                                    VOTES_ <span class="text-xl font-bold">${nominee.votes || 0}</span>
                                </div>
                                <button ${disabledAttr} onclick="vote('${nominee.id}', ${nominee.votes})" class="${btnStyle} px-4 py-1 text-[10px] font-black uppercase tracking-widest transition-all">
                                    ${btnText}
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        window.onload = () => {
            if (localStorage.getItem('hasNominated') === 'true') {
                document.getElementById("form-status").innerHTML = "NOMINATION_ALREADY_LOGGED";
                document.getElementById("form-status").classList.replace("text-blue-500", "text-orange-500");
            }
            loadNominees();
        };
    </script>
</body>
</html>
